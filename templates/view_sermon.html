<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>{{.Title}}</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    width:80%;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 8px #ccc;
}

h1{
    color:#8B0000;
}

.info{
    color:#666;
    margin-bottom:20px;
}

a{
    text-decoration:none;
    color:#8B0000;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>{{.Title}}</h1>

<div class="info">

<p><strong>Bible Verse:</strong> {{.BibleVerse}}</p>

<p><strong>References:</strong> {{.References}}</p>

<p><strong>Category:</strong> {{.Category}}</p>

<p><strong>Date:</strong> {{.Date}}</p>

<p><strong>Preacher:</strong> {{.CreatedBy}}</p>

</div>

<hr><br>

<p>{{.Content}}</p>

<br><br>

<a href="/sermons">← Back to Sermons</a>

</div>

</body>

</html>
