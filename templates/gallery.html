<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Church Gallery</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#8B0000;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    margin:30px auto;
}

.card{
    background:white;
    display:inline-block;
    width:300px;
    margin:15px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px #ccc;
    vertical-align:top;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h3{
    padding:10px;
    color:#8B0000;
}

.card p{
    padding:0 10px 15px;
}

.top{
    margin-bottom:20px;
}

.btn{
    background:#8B0000;
    color:white;
    padding:10px 18px;
    text-decoration:none;
    border-radius:5px;
    font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>📸 Church Gallery</h1>

</header>

<div class="container">

<div class="top">

<a href="/home" class="btn">← Back Home</a>

&nbsp;

<a href="/admin/add-gallery" class="btn">➕ Upload Image</a>

</div>

{{range .}}

<div class="card">

<img src="{{.Image}}" alt="{{.Title}}">

<h3>{{.Title}}</h3>

<p>{{.Description}}</p>

</div>

{{else}}

<h2>No images uploaded yet.</h2>

{{end}}

</div>

</body>

</html>
