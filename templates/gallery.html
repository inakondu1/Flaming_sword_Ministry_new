<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Church Gallery</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#8B0000;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    margin:auto;
    padding:30px;
}

.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:8px;
    overflow:hidden;
    box-shadow:0 0 10px #ccc;
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    padding:15px;
    color:#8B0000;
}

.card p{
    padding:0 15px 20px;
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    padding:10px 18px;
    background:#8B0000;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

</style>

</head>

<body>

<header>

<h1>📷 Church Gallery</h1>

</header>

<div class="container">

<a href="/home" class="back-btn">← Back Home</a>

<div class="gallery">

{{range .}}

<div class="card">

<img src="/static/images/{{.Image}}">

<h3>{{.Title}}</h3>

<p>{{.Description}}</p>

</div>

{{else}}

<h2>No Images Available.</h2>

{{end}}

</div>

</div>

</body>

</html>
