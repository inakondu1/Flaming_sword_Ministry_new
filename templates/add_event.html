<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Add Event</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
}

header{
background:#8B0000;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

input,
textarea{
width:100%;
padding:12px;
margin:10px 0 20px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

textarea{
height:150px;
resize:vertical;
}

button{
background:#8B0000;
color:white;
padding:12px 25px;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#700000;
}

.back{
display:inline-block;
margin-top:20px;
text-decoration:none;
font-weight:bold;
color:#8B0000;
}

footer{
margin-top:40px;
background:#222;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>📅 Add Church Event</h1>

</header>

<div class="container">

<form method="POST" action="/admin/add-event">

<label>Event Title</label>

<input
type="text"
name="title"
required>

<label>Description</label>

<textarea
name="description"
required></textarea>

<label>Event Date</label>

<input
type="date"
name="event_date"
required>

<label>Event Time</label>

<input
type="time"
name="event_time"
required>

<label>Venue</label>

<input
type="text"
name="venue"
required>

<button type="submit">

Save Event

</button>

</form>

<a class="back" href="/admin">

← Back to Dashboard

</a>

</div>

<footer>

Flaming Sword Ministry International © 2026

</footer>

</body>

</html>
