<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Church Announcements</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#8B0000;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    margin:30px auto;
}

.card{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:8px;
    box-shadow:0 0 5px #ccc;
}

.card h2{
    color:#8B0000;
}

.date{
    color:gray;
    font-size:14px;
}

a{
    color:#8B0000;
    text-decoration:none;
    font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>📢 Church Announcements</h1>

</header>

<div class="container">

{{range .}}

<div class="card">

<h2>{{.Title}}</h2>

<p>{{.Message}}</p>

<p class="date">{{.CreatedAt}}</p>

</div>

{{else}}

<div class="card">

<h2>No announcements available.</h2>

</div>

{{end}}

<br>

<a href="/">← Back Home</a>

</div>

</body>

</html>
