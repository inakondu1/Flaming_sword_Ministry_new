<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Create Announcement</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    width:650px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:8px;
    box-shadow:0 0 10px #ccc;
}

h1{
    text-align:center;
    color:#8B0000;
}

input,
textarea{
    width:100%;
    padding:12px;
    margin-bottom:20px;
}

textarea{
    height:180px;
}

button{
    width:100%;
    padding:15px;
    background:#8B0000;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

</style>

</head>

<body>

<div class="container">

<h1>Create Announcement</h1>

<form action="/admin/announcement" method="POST">
    

<label>Title</label>

<input
type="text"
name="title"
required
>

<label>Message</label>

<textarea
name="message"
required
></textarea>

<button type="submit">

Publish Announcement

</button>

</form>

</div>

</body>

</html>
