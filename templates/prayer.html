<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prayer Request</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
}

header{
background:#8B0000;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

textarea{
height:180px;
resize:vertical;
}

button{
background:#8B0000;
color:white;
border:none;
padding:14px 25px;
cursor:pointer;
border-radius:5px;
font-size:16px;
}

button:hover{
background:#700000;
}

.back{
display:inline-block;
margin-top:20px;
text-decoration:none;
color:#8B0000;
font-weight:bold;
}

footer{
margin-top:40px;
background:#222;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>🙏 Prayer Request</h1>

<p>We believe God answers prayers.</p>

</header>

<div class="container">

<h2>Submit Your Prayer Request</h2>

<br>

<form method="POST" action="/prayer">

<label>Your Name</label>

<input
type="text"
name="name"
placeholder="Enter your name"
required>

<label>Prayer Request</label>

<textarea
name="request"
placeholder="Type your prayer request here..."
required></textarea>

<button type="submit">

Submit Prayer Request

</button>

</form>


<a class="back" href="/home">← Back Home</a>

</div>

<footer>

Flaming Sword Ministry International © 2026

</footer>

</body>

</html>
