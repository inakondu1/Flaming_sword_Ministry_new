<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prayer Request</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial, Helvetica, sans-serif;
background:#f4f4f4;
}

header{
background:#8B0000;
color:white;
padding:20px;
text-align:center;
}

.container{
width:90%;
max-width:700px;
margin:40px auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

h2{
color:#8B0000;
margin-bottom:20px;
text-align:center;
}

label{
font-weight:bold;
display:block;
margin-bottom:8px;
}

input,
textarea{
width:100%;
padding:12px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:5px;
font-size:16px;
}

textarea{
height:180px;
resize:vertical;
}

button{
width:100%;
padding:15px;
background:#8B0000;
color:white;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#a00000;
}

.back{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#8B0000;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>🙏 Prayer Request</h1>

</header>

<div class="container">

<h2>We Would Love To Pray With You</h2>

<form action="/prayer" method="POST">

<label>Full Name</label>

<input
type="text"
name="name"
required
>


<label>Your Prayer Request</label>

<textarea
name="request"
required
></textarea>

<button type="submit">

Submit Prayer Request

</button>

</form>

<a href="/home" class="back">

← Back to Home

</a>

</div>

</body>

</html>
