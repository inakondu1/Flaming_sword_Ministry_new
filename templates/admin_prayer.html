<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prayer Requests</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#f4f4f4;
}

header{
background:#8B0000;
color:white;
padding:20px;
text-align:center;
}

.container{
width:95%;
margin:auto;
padding:30px 0;
}

table{
width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}

th{
background:#8B0000;
color:white;
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f8f8f8;
}

.action{
background:#8B0000;
color:white;
padding:8px 14px;
text-decoration:none;
border-radius:4px;
}

.back{
display:inline-block;
margin-bottom:20px;
background:#444;
color:white;
padding:10px 15px;
text-decoration:none;
border-radius:5px;
}

footer{
margin-top:40px;
background:#222;
color:white;
text-align:center;
padding:20px;
}

</style>

</head>

<body>

<header>

<h1>🙏 Prayer Requests</h1>

<p>Pastoral Prayer Desk</p>

</header>

<div class="container">

<a class="back" href="/admin">← Back to Dashboard</a>

<table>

<tr>

<th>ID</th>

<th>Name</th>

<th>Prayer Request</th>

<th>Status</th>

<th>Date</th>
<th>Action</th>
</tr>

{{range .}}

<tr>

<td>{{.ID}}</td>

<td>{{.Name}}</td>

<td>{{.Request}}</td>

<td>{{.Status}}</td>

<td>{{.CreatedAt}}</td>

<td>

<a class="action"
href="/admin/delete-prayer?id={{.ID}}"
onclick="return confirm('Delete this prayer request?')">

🗑 Delete


</tr>

{{else}}

<tr>

<td colspan="5">

No Prayer Requests Yet.

</td>

</tr>

{{end}}

</table>

</div>

<footer>

Flaming Sword Ministry International © 2026

</footer>

</body>

</html>
