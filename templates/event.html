<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Church Events</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
    margin:0;
}

header{
    background:#8B0000;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    margin:30px auto;
}

.card{
    background:white;
    margin-bottom:20px;
    padding:20px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card h2{
    color:#8B0000;
}

.card p{
    margin:8px 0;
}

.button{
    display:inline-block;
    background:#8B0000;
    color:white;
    padding:10px 18px;
    text-decoration:none;
    border-radius:5px;
    margin-top:10px;
}

.back{
    display:inline-block;
    margin-top:20px;
    background:#444;
    color:white;
    padding:10px 18px;
    text-decoration:none;
    border-radius:5px;
}

</style>

</head>

<body>

<header>

<h1>Church Events</h1>

</header>

<div class="container">

{{range .}}

<div class="card">

<h2>{{.Title}}</h2>

<p><strong>Description:</strong> {{.Description}}</p>

<p><strong>Date:</strong> {{.EventDate}}</p>

<p><strong>Time:</strong> {{.EventTime}}</p>

<p><strong>Venue:</strong> {{.Venue}}</p>

<a class="button"
href="/admin/delete-event?id={{.ID}}">

Delete Event

</a>

</div>

{{else}}

<h2>No Upcoming Events.</h2>

{{end}}

<a class="back" href="/home">

← Back Home

</a>

</div>

</body>

</html>
