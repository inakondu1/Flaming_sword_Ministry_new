<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Edit Sermon</title>

<style>

body{
    font-family:Arial;
    background:#f4f4f4;
}

.container{
    width:700px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:8px;
}

input,textarea{
    width:100%;
    padding:12px;
    margin-bottom:15px;
}

textarea{
    height:200px;
}

button{
    width:100%;
    padding:14px;
    background:#8B0000;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Edit Sermon</h1>

<form method="POST" action="/admin/edit-sermon">

<input type="hidden" name="id" value="{{.ID}}">

<label>Title</label>

<input
type="text"
name="title"
value="{{.Title}}"
required
>

<label>Bible Verse</label>

<input
type="text"
name="bible_verse"
value="{{.BibleVerse}}"
required
>

<label>References</label>

<input
type="text"
name="references"
value="{{.References}}"
>

<label>Category</label>

<input
type="text"
name="category"
value="{{.Category}}"
>

<label>Date</label>

<input
type="date"
name="date"
value="{{.Date}}"
>

<label>Created By</label>

<input
type="text"
name="created_by"
value="{{.CreatedBy}}"
>

<label>Content</label>

<textarea name="content">{{.Content}}</textarea>

<button type="submit">

Update Sermon

</button>

</form>

</div>

</body>

</html>
